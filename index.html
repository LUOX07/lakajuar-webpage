<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAKAJUAR - Tienda virtual</title>
  <link rel="icon" href="assets/images/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="https://lakajuar.com.py" class="logo-container-link">
      <div class="logo-container">
        <img src="assets/images/logo.svg" alt="LAKAJUAR logo" class="logo" />
        <div>
          <h1>LAKAJUAR</h1>
          <p>Accesorios que brillan</p>
        </div>
      </div>
    </a>
    <div class="shop-controls">
      <input id="search-input" type="search" placeholder="Buscar productos..." />
      <div class="category-buttons">
        <button data-cat="all" class="active">Todos</button>
        <button data-cat="telefonos">Teléfonos</button>
        <button data-cat="joyas">Joyas</button>
      </div>
      <div class="cart-status">Carrito: <span id="cart-count">0</span></div>
    </div>
  </header>

  <main class="main-content">
    <section class="shop-section" aria-label="Productos">
      <h2>Productos</h2>
      <div class="product-grid" id="product-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Síguenos en Instagram: <a href="https://www.instagram.com/lakajuar_acc/" target="_blank" rel="noreferrer">lakajuar_acc</a></p>
    <p>Visita nuestro sitio: <a href="https://LUOX07.github.io/lakajuar-webpage">https://LUOX07.github.io/lakajuar-webpage</a></p>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
