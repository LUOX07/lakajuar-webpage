<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAKAJUAR - Tienda virtual</title>
  <link rel="icon" href="assets/images/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="https://lakajuar.com.py" class="logo-container-link">
      <div class="logo-container">
        <img src="assets/images/logo.svg" alt="LAKAJUAR logo" class="logo" />
        <div>
          <h1>LAKAJUAR</h1>
          <p>Accesorios que brillan</p>
        </div>
      </div>
    </a>
    <div class="shop-controls">
      <input id="search-input" type="search" placeholder="Buscar productos..." />
      <div class="cart-status" role="status" aria-live="polite">
        <span class="cart-icon" aria-hidden="true">🛒</span>
        <span>Carrito</span>
        <strong id="cart-count">0</strong>
      </div>
    </div>
  </header>

  <main class="main-content">
    <section class="shop-section" aria-label="Productos">
      <h2>Productos</h2>
      <div class="category-tabs" role="tablist" aria-label="Categorías">
        <button class="tab-button active" data-cat="joyas" role="tab">JOYAS</button>
        <button class="tab-button" data-cat="cases" role="tab">CASES</button>
        <button class="tab-button" data-cat="accesorios" role="tab">ACCESORIOS</button>
      </div>
      <div class="product-grid" id="product-grid"></div>
    </section>
  </main>

  <button id="cart-toggle-btn" class="floating-cart-btn" aria-label="Abrir carrito" title="Ver carrito">
    🛒 <span id="floating-cart-count">0</span>
  </button>

  <aside id="cart-drawer" class="cart-drawer" aria-label="Carrito de compras" aria-live="polite">
    <div class="cart-drawer-header">
      <h3>Tu carrito</h3>
      <button id="close-cart-drawer" aria-label="Cerrar carrito">✕</button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div class="coupon-section">
      <label for="coupon-code" class="coupon-label">Código cupón</label>
      <input id="coupon-code" type="text" placeholder="Ingrese su cupón" />
      <button id="coupon-apply-btn" class="btn">Aplicar</button>
      <small id="coupon-message" class="coupon-message"></small>
    </div>
    <div class="cart-drawer-footer">
      <div class="cart-total-line"><span>Subtotal</span> <strong id="cart-subtotal">$0.00</strong></div>
      <div class="cart-total-line"><span>Descuento</span> <strong id="cart-discount">$0.00</strong></div>
      <div class="cart-total-line"><span>Envío</span> <strong id="cart-shipping">$0.00</strong></div>
      <div class="cart-total-line total"><span>Total</span> <strong id="cart-total">$0.00</strong></div>
      <button id="checkout-btn" class="btn">Ir a pagar</button>
    </div>
  </aside>

  <footer class="site-footer">
    <p>Síguenos en Instagram: <a href="https://www.instagram.com/lakajuar_acc/" target="_blank" rel="noreferrer">lakajuar_acc</a></p>
    <p>Visita nuestro sitio: <a href="https://LUOX07.github.io/lakajuar-webpage">https://LUOX07.github.io/lakajuar-webpage</a></p>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
