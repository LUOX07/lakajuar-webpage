<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - LAKAJUAR</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="https://lakajuar_acc.com.py/index.html"><img src="../assets/images/logo.png" alt="LAKAJUAR Logo"></a>
        </div>
        <nav>
            <ul>
                <li><a href="https://lakajuar_acc.com.py/pages/accessories.html">Accesorios</a></li>
                <li><a href="https://lakajuar_acc.com.py/pages/jewelry.html">Joyas</a></li>
                <li><a href="https://lakajuar_acc.com.py/pages/contact.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contacto</h1>
        <p>Si tienes alguna pregunta o comentario, no dudes en contactarnos a través del siguiente formulario:</p>
        <form action="#" method="post">
            <label for="name">Nombre:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Mensaje:</label>
            <textarea id="message" name="message" rows="4" required></textarea>

            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer>
        <!-- Include footer component -->
        <!-- Add your footer HTML here -->
    </footer>

    <script src="../assets/js/main.js"></script>
</body>
</html>
